<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Password Calculator</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background-color: #f4f4f4;\n            color: #333;\n            padding: 20px;\n        }\n        .container {\n            max-width: 400px;\n            margin: auto;\n            background: white;\n            padding: 20px;\n            border-radius: 8px;\n            box-shadow: 0 0 10px rgba(0,0,0,0.1);\n        }\n        h1 {\n            text-align: center;\n        }\n        label {\n            display: block;\n            margin-bottom: 8px;\n        }\n        input {\n            width: 100%;\n            padding: 8px;\n            margin-bottom: 10px;\n            border: 1px solid #ddd;\n            border-radius: 4px;\n        }\n        button {\n            width: 100%;\n            padding: 10px;\n            background-color: #5cb85c;\n            color: white;\n            border: none;\n            border-radius: 4px;\n            cursor: pointer;\n        }\n        button:hover {\n            background-color: #4cae4c;\n        }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>Password Calculator</h1>\n        <label for="password">Enter a password:</label>\n        <input type="text" id="password" placeholder="Your password here">\n        <button onclick="calculatePasswordStrength()">Calculate Strength</button>\n        <div id="result"></div>\n    </div>\n    <script>\n        function calculatePasswordStrength() {\n            const password = document.getElementById('password').value;\n            let strength = 'Weak';\n            const lengthCriteria = password.length >= 8;\n            const numberCriteria = /[0-9]/.test(password);\n            const specialCharacterCriteria = /[!@#$%^&*]/.test(password);\n            const uppercaseCriteria = /[A-Z]/.test(password);\n            \n            if (lengthCriteria && (numberCriteria || specialCharacterCriteria) && uppercaseCriteria) {\n                strength = 'Strong';\n            } else if (lengthCriteria && (numberCriteria || specialCharacterCriteria)) {\n                strength = 'Medium';\n            }\n            document.getElementById('result').innerText = 'Password Strength: ' + strength;\n        }\n    </script>\n</body>\n</html>
