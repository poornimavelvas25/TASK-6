<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #5cb85c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #4cae4c;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
            padding: 10px;
            border-radius: 4px;
        }
        .weak {
            color: #d9534f;
            background-color: #f2dede;
        }
        .medium {
            color: #8a6d3b;
            background-color: #fcf8e3;
        }
        .strong {
            color: #3c763d;
            background-color: #dff0d8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Password Calculator</h1>
        <label for="password">Enter a password:</label>
        <input type="text" id="password" placeholder="Your password here">
        <button onclick="calculatePasswordStrength()">Calculate Strength</button>
        <div id="result"></div>
    </div>
    <script>
        function calculatePasswordStrength() {
            const password = document.getElementById('password').value;
            let strength = 'Weak';
            let score = 0;
            const resultDiv = document.getElementById('result');
            
            // Check criteria
            const lengthCriteria = password.length >= 12;
            const numberCriteria = /[0-9]/.test(password);
            const specialCharacterCriteria = /[!@#$%^&*(),.?":{}<>|]/.test(password);
            const uppercaseCriteria = /[A-Z]/.test(password);
            const lowercaseCriteria = /[a-z]/.test(password);
            
            // Calculate score
            if (lengthCriteria) score++;
            if (uppercaseCriteria) score++;
            if (numberCriteria) score++;
            if (specialCharacterCriteria) score++;
            if (lowercaseCriteria) score++;
            
            // Determine strength based on score
            if (score >= 5) {
                strength = 'Strong';
            } else if (score >= 3) {
                strength = 'Medium';
            } else {
                strength = 'Weak';
            }
            
            resultDiv.className = strength.toLowerCase();
            resultDiv.innerText = 'Password Strength: ' + strength + ' (Score: ' + score + '/5)';
        }
    </script>
</body>
</html>
